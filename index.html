<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Opponent Notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section id="login-view" class="login-panel">
      <h1>Poker Opponent Notes</h1>
      <p>Sign in to access your notes.</p>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>

        <button class="primary-button" type="submit">Sign In</button>
        <p id="login-error" class="error-message" aria-live="polite"></p>
      </form>
    </section>

    <section id="notes-view" hidden>
      <header class="top-bar">
        <div class="search-group">
          <label class="sr-only" for="player-search">Search players</label>
          <input
            id="player-search"
            type="search"
            placeholder="Search screen names..."
            autocomplete="off"
          >

          <label class="sr-only" for="category-filter">Filter by category</label>
          <select id="category-filter">
            <option value="all">All categories</option>
            <option value="uncategorized">Uncategorized</option>
            <option value="fish">Fish</option>
            <option value="wild-fish">Wild Fish</option>
            <option value="good-reg">Good Reg</option>
            <option value="tight-reg">Tight Reg</option>
          </select>
        </div>

        <button id="add-player-button" class="primary-button" type="button">
          Add New Note
        </button>

        <button id="sign-out-button" class="secondary-button" type="button">
          Sign Out
        </button>
      </header>

      <p id="save-status" class="save-status" aria-live="polite"></p>

      <section id="player-grid" class="player-grid" aria-label="Poker opponent notes"></section>

      <p id="empty-message" class="empty-message" hidden>
        No players match your search.
      </p>
    </section>
  </main>

  <template id="player-card-template">
    <article class="player-card" data-category="uncategorized">
      <div class="card-header">
        <div class="field-group">
          <label class="field-label">Screen name</label>
          <input class="screen-name-input" type="text" maxlength="50">
        </div>

        <div class="field-group category-group">
          <label class="field-label">Category</label>
          <select class="category-select">
            <option value="uncategorized">Uncategorized</option>
            <option value="fish">Fish</option>
            <option value="wild-fish">Wild Fish</option>
            <option value="good-reg">Good Reg</option>
            <option value="tight-reg">Tight Reg</option>
          </select>
        </div>
      </div>

      <div class="field-group notes-group">
        <label class="field-label">Notes</label>
        <textarea
          class="notes-input"
          rows="12"
          placeholder="Type notes here..."
        ></textarea>
      </div>

      <div class="card-footer">
        <span class="card-saved-status" aria-live="polite"></span>
        <button class="delete-button" type="button">Delete Note</button>
      </div>
    </article>
  </template>

  <script type="module" src="script.js"></script>
</body>
</html>
